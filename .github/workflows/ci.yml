name: LLM Observability API CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Run Pytest
        run: pytest api/test_app.py -v --disable-warnings

      - name: Run Security Scan
        run: bandit -r api/app.py

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/monitoring/prometheus/prometheus.yml:/prometheus.yml \
            --entrypoint promtool \
            prom/prometheus:latest \
            check config /prometheus.yml

  publish-images:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: llm-observability-api
            context: ./api
            dockerfile: ./Dockerfile
          - image_name: llm-observability-grafana
            context: .
            dockerfile: ./docker/grafana/Dockerfile
          - image_name: llm-observability-prometheus
            context: .
            dockerfile: ./docker/prometheus/Dockerfile
          - image_name: llm-observability-pushgateway
            context: .
            dockerfile: ./docker/pushgateway/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}:${{ github.sha }}
