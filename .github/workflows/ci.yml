name: LLM Observability API CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Run Pytest
        run: pytest api/test_app.py -v --disable-warnings

      - name: Run Security Scan
        run: bandit -r api/app.py

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/monitoring/prometheus/prometheus.yml:/prometheus.yml \
            --entrypoint promtool \
            prom/prometheus:latest \
            check config /prometheus.yml

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/llm-observability-api:latest ./api

      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/llm-observability-api:latest

      - name: Save Docker image as artifact
        run: docker save ${{ secrets.DOCKERHUB_USERNAME }}/llm-observability-api:latest -o llm-api.tar

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-observability-api-image
          path: llm-api.tar
