global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - pushgateway:9091

  - job_name: dcgm_exporter
    static_configs:
      - targets:
          - dcgm-exporter:9400
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: vllm
    static_configs:
      - targets:
          - 10.242.237.172:8000
    metrics_path: /metrics
    scrape_interval: 15s
