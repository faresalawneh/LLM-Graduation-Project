global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # AIPerf metrics pushed from GPU server
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # GPU metrics scraped directly from DCGM Exporter on JUST server
  # CHANGE: replace with actual server IP
  - job_name: 'dcgm_exporter'
    static_configs:
      - targets: ['CHANGE_ME:9400']   # e.g. '10.0.0.5:9400'
    metrics_path: /metrics
    scrape_interval: 10s
