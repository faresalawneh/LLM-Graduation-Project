global:
  scrape_interval: 15s        # How often Prometheus pulls metrics
  evaluation_interval: 15s

scrape_configs:

  # Prometheus monitors itself (optional but useful)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── THIS IS THE KEY PART ──────────────────────────────────
  # Prometheus scrapes the Pushgateway every 15 seconds
  # Colab pushes metrics to Pushgateway → Prometheus picks them up here
  - job_name: 'pushgateway'
    honor_labels: true          # Keeps the job labels Colab sends (e.g. 'colab_benchmark')
    static_configs:
      - targets: ['pushgateway:9091']
